<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISC1 — Calculateur de Notes</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <h1>🎓 ISC1 — Calculateur de Notes</h1>
  <p>Entrez vos notes pour calculer automatiquement vos moyennes</p>
</header>

<nav>
  <a href="index.html" class="active">📝 Notes</a>
  <a href="stats.html">📊 Statistiques</a>
</nav>

<div class="summary" id="summary"></div>
<div id="modules"></div>

<div class="actions">
  <button onclick="exportData()" title="Télécharger les données en JSON">📥 Exporter JSON</button>
  <button onclick="document.getElementById('import-file').click()" title="Charger un fichier JSON">📤 Importer JSON</button>
  <input type="file" id="import-file" accept=".json" onchange="importData(event)">
  <button onclick="document.getElementById('import-xlsx').click()" title="Importer depuis un fichier Excel (.xlsx)">📊 Importer Excel</button>
  <input type="file" id="import-xlsx" accept=".xlsx,.xls" onchange="importExcel(event)" style="display:none">
  <button class="danger" onclick="resetData()" title="Effacer toutes les notes">🗑️ Réinitialiser</button>
</div>

<div class="credits">
  Basé sur le fichier Excel de Ludovic Peyter — Interface web PoC
</div>

<script src="js/curriculum.js"></script>
<script src="js/state.js"></script>
<script src="js/calculations.js"></script>
<script src="js/app.js"></script>
</body>
</html>
